# Caddy Configuration for Playlist Lab
# Caddy automatically handles HTTPS with Let's Encrypt

yourdomain.com, www.yourdomain.com {
    # Automatic HTTPS with Let's Encrypt
    # Caddy will automatically obtain and renew certificates

    # Security headers
    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
        X-Frame-Options "SAMEORIGIN"
        X-Content-Type-Options "nosniff"
        X-XSS-Protection "1; mode=block"
        Referrer-Policy "strict-origin-when-cross-origin"
        -Server
    }

    # Logging
    log {
        output file /var/log/caddy/playlist-lab-access.log
        format json
    }

    # API reverse proxy
    handle /api/* {
        reverse_proxy localhost:3000 {
            # Health check
            health_uri /api/health
            health_interval 30s
            health_timeout 5s

            # Headers
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-For {remote_host}
            header_up X-Forwarded-Proto {scheme}
            header_up X-Forwarded-Host {host}
        }
    }

    # Serve static files (web client)
    handle {
        root * /var/www/playlist-lab/web
        
        # Try files, fallback to index.html for SPA routing
        try_files {path} /index.html
        
        # Cache static assets
        @static {
            path *.js *.css *.png *.jpg *.jpeg *.gif *.ico *.svg *.woff *.woff2 *.ttf *.eot
        }
        header @static Cache-Control "public, max-age=31536000, immutable"
        
        file_server
    }

    # Deny access to hidden files
    @hidden {
        path */.*
    }
    respond @hidden 404
}
