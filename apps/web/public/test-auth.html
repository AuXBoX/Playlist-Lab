<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Test - Playlist Lab</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 8px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover {
      background: #5568d3;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .log {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #667eea;
      padding-left: 10px;
    }
    .log-error {
      border-left-color: #f44336;
      color: #ff6b6b;
    }
    .log-success {
      border-left-color: #4caf50;
      color: #69f0ae;
    }
    .pin-display {
      background: #667eea;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin: 20px 0;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Plex Authentication Test</h1>
    <p>This page tests the Plex PIN authentication flow directly.</p>
    
    <div>
      <button id="startBtn" onclick="startAuth()">Start PIN Auth</button>
      <button id="pollBtn" onclick="pollAuth()" disabled>Poll for Auth</button>
      <button id="clearBtn" onclick="clearLog()">Clear Log</button>
    </div>
    
    <div id="pinDisplay" style="display: none;" class="pin-display"></div>
    
    <div class="log" id="log"></div>
  </div>

  <script>
    let pinId = null;
    let pinCode = null;
    let pollInterval = null;

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : ''}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    async function startAuth() {
      log('Starting Plex PIN authentication...');
      document.getElementById('startBtn').disabled = true;
      
      try {
        const response = await fetch('/api/auth/start', {
          method: 'POST',
          credentials: 'include',
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        pinId = data.id;
        pinCode = data.code;
        
        log(`✓ PIN created: ${pinCode}`, 'success');
        log(`PIN ID: ${pinId}`);
        log(`Auth URL: ${data.authUrl}`);
        
        // Display PIN
        const pinDisplay = document.getElementById('pinDisplay');
        pinDisplay.textContent = pinCode;
        pinDisplay.style.display = 'block';
        
        // Open auth page
        window.open(data.authUrl, '_blank');
        log('Opened Plex auth page in new tab');
        
        // Enable poll button
        document.getElementById('pollBtn').disabled = false;
        
        // Start auto-polling
        log('Starting auto-poll (every 2 seconds)...');
        pollInterval = setInterval(pollAuth, 2000);
        
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
        document.getElementById('startBtn').disabled = false;
      }
    }

    async function pollAuth() {
      if (!pinId || !pinCode) {
        log('No PIN to poll', 'error');
        return;
      }
      
      try {
        const response = await fetch('/api/auth/poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ pinId, code: pinCode }),
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (data.denied) {
          log(`✗ Access denied: ${data.message}`, 'error');
          stopPolling();
        } else if (data.authenticated) {
          log(`✓ AUTHENTICATED! User: ${data.user.plexUsername}`, 'success');
          log(`User ID: ${data.user.id}`);
          log(`Is Admin: ${data.user.isAdmin}`);
          stopPolling();
          
          // Test /me endpoint
          setTimeout(testMeEndpoint, 1000);
        } else {
          log('Waiting for authorization...');
        }
        
      } catch (error) {
        log(`✗ Poll error: ${error.message}`, 'error');
      }
    }

    async function testMeEndpoint() {
      log('Testing /api/auth/me endpoint...');
      try {
        const response = await fetch('/api/auth/me', {
          credentials: 'include',
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        log(`✓ /me endpoint works! User: ${data.plexUsername}`, 'success');
        
      } catch (error) {
        log(`✗ /me endpoint error: ${error.message}`, 'error');
      }
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
        log('Stopped auto-polling');
      }
      document.getElementById('pollBtn').disabled = true;
      document.getElementById('startBtn').disabled = false;
    }

    log('Ready to test authentication');
  </script>
</body>
</html>
