version: '3.8'

services:
  playlist-lab-staging:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NODE_ENV: production
    container_name: playlist-lab-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"  # Only expose to localhost (reverse proxy will handle external access)
    volumes:
      - /var/lib/playlist-lab-staging:/data
      - /var/log/playlist-lab-staging:/app/logs
    env_file:
      - ../.env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/data/playlist-lab.db
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - playlist-lab-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  playlist-lab-network:
    driver: bridge

volumes:
  staging-data:
    driver: local
  staging-logs:
    driver: local
