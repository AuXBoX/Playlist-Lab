name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.0)'
        required: true
        default: '2.0.0'

# Prevent multiple workflow runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '20'
  PUPPETEER_SKIP_DOWNLOAD: 'true'
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

jobs:
  # Build server installers for all platforms
  build-server-installers:
    name: Build Server Installers
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: linux-packages
          - os: macos-latest
            platform: macos
            artifact: macos-installers
          - os: windows-latest
            platform: windows
            artifact: windows-installer
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build shared package
        run: |
          cd packages/shared
          npm ci --legacy-peer-deps
          npm run build
      
      - name: Build server
        run: |
          cd apps/server
          npm ci --legacy-peer-deps
          npm run build
      
      - name: Build web app
        run: |
          cd apps/web
          npm ci --legacy-peer-deps
          npm run build
      
      # Linux-specific build
      - name: Build Linux packages
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm
          bash .github/scripts/installers/linux/build-linux.sh
      
      # macOS-specific build
      - name: Build macOS installers
        if: matrix.platform == 'macos'
        run: bash .github/scripts/installers/macos/build-macos.sh
      
      # Windows-specific build
      - name: Setup Inno Setup (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install innosetup -y
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: bash
        run: bash .github/scripts/installers/windows/build-windows.sh
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.pkg
            release/**/*.deb
            release/**/*.rpm
            release/**/*.AppImage
          retention-days: 30

  # Build desktop app for all platforms
  build-desktop-app:
    name: Build Desktop App
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            script: build:linux
          - os: macos-latest
            platform: mac
            script: build:mac
          - os: windows-latest
            platform: win
            script: build:win
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build desktop app
        run: |
          cd apps/desktop
          npm ci --legacy-peer-deps
          npm run ${{ matrix.script }}
      
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            scripts/release/*.exe
            scripts/release/*.dmg
            scripts/release/*.AppImage
            scripts/release/*.deb
            scripts/release/*.zip
          retention-days: 30

  build-mobile-android:
    name: Build Android App
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Install dependencies
        run: |
          cd apps/mobile
          npm install
      
      - name: Build Android app
        run: |
          cd apps/mobile
          eas build --platform android --profile production --non-interactive --no-wait

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [build-server-installers, build-desktop-app]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Display structure
        run: ls -R release-artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.pkg
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and push Docker image
  build-docker:
    name: Build Docker Image
    needs: [build-server-installers]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check Docker credentials
        id: docker-check
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Docker credentials not configured - skipping Docker build"
          fi
      
      - name: Set up Docker Buildx
        if: steps.docker-check.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: steps.docker-check.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract version
        if: steps.docker-check.outputs.configured == 'true'
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build and push
        if: steps.docker-check.outputs.configured == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/playlist-lab-server:latest
            ${{ secrets.DOCKER_USERNAME }}/playlist-lab-server:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/playlist-lab-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/playlist-lab-server:buildcache,mode=max
